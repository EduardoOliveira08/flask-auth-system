<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
        }

        .container{
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        input{
            margin-bottom: 15px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        input:focus{
            border-color: #4f46e5;
        }

        button{
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #4338ca;
        }

        .link{
            margin-top: 15px;
            text-align: center;
        }

        .link a{
            text-decoration: none;
            color: #4f46e5;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Login</h1>

        <form method="POST">

            <input 
                type="text"
                name="usrLogin"
                placeholder="Usuário"
            >

            <input 
                type="password"
                name="senhaLogin"
                placeholder="Senha"
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        <div class="link">
            <p>
                Não possui conta?
                <a href="/cadastro">Cadastre-se</a>
            </p>
        </div>
    </div>

</body>
</html>
