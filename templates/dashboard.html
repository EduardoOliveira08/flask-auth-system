<!-- templates/dashboard.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f4f4f4;
        }

        header{
            background: #4f46e5;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container{
            padding: 40px;
        }

        .card{
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        a{
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <header>

        <h2>Painel do Sistema</h2>

        <a href="/logout">
            Logout
        </a>

    </header>

    <div class="container">

        <div class="card">

            <h1>
                Bem-vindo, {{ usuario }}
            </h1>

            <p style="margin-top: 15px;">
                Seu sistema Flask está funcionando corretamente.
            </p>

        </div>

    </div>

</body>
</html>
