<!-- templates/cadastro.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
        }

        .container{
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        input{
            margin-bottom: 15px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        input:focus{
            border-color: #10b981;
        }

        button{
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #10b981;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #059669;
        }

        .link{
            margin-top: 15px;
            text-align: center;
        }

        .link a{
            text-decoration: none;
            color: #10b981;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Cadastro</h1>

        <form method="POST">

            <input
                type="text"
                name="usr"
                placeholder="Usuário"
            >

            <input
                type="password"
                name="senha"
                placeholder="Senha"
            >

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <div class="link">

            <p>
                Já possui conta?
                <a href="/login">Entrar</a>
            </p>

        </div>

    </div>

</body>
</html>
